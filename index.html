<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Daedalus OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
              mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: "Inter", sans-serif; background: #0f172a; color: #e2e8f0; }
      #root { width: 100%; height: 100%; }
      .glass { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
      .desktop-bg { background: radial-gradient(circle at 10% 20%, rgba(30,30,40,1) 0%, rgba(10,10,15,1) 100%); }
      .xterm { padding: 12px; font-family: "JetBrains Mono", ui-monospace; }
      .mac-shadow { box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5); }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useRef, useState } = React;

      function App() {
        const termShellRef = useRef(null);
        const termDesktopRef = useRef(null);
        const termInstanceRef = useRef(null);
        const fitAddonRef = useRef(null);
        const inputBufferRef = useRef("");
        const fsRef = useRef(createFileSystem());
        const cwdRef = useRef("/home/daedalus");
        const historyRef = useRef([]);
        const historyIndexRef = useRef(-1);

        const [desktopOpen, setDesktopOpen] = useState(false);
        const [clock, setClock] = useState(new Date());

        useEffect(() => {
          const interval = setInterval(() => setClock(new Date()), 1000);
          return () => clearInterval(interval);
        }, []);

        useEffect(() => {
          if (!window.Terminal || !window.FitAddon) {
            console.error("Missing xterm.js");
            return;
          }

          const term = new window.Terminal({
            fontFamily: "JetBrains Mono",
            fontSize: 13,
            letterSpacing: 1,
            cursorBlink: true,
            theme: {
              background: "#000000",
              foreground: "#d1d5db",
              cursor: "#7ce7d6",
            },
          });

          const fitAddon = new window.FitAddon.FitAddon();
          term.loadAddon(fitAddon);
          term.open(termShellRef.current);
          fitAddon.fit();

          term.writeln("Daedalus Runtime v2.1");
          term.writeln("Type 'help' for commands");
          term.write("daedalus:: ");

          term.onData((data) => handleTerminalData(data, term));
          window.addEventListener("resize", () => fitAddon.fit());

          termInstanceRef.current = term;
          fitAddonRef.current = fitAddon;
        }, []);

        const handleTerminalData = (data, term) => {
          if (data === "\r") {
            const input = inputBufferRef.current.trim();
            historyRef.current.push(input);
            historyIndexRef.current = historyRef.current.length;
            inputBufferRef.current = "";
            term.write("\r\n");
            executeCommand(input, term);
            return;
          }

          if (data === "\u007f") {
            if (inputBufferRef.current.length > 0) {
              inputBufferRef.current = inputBufferRef.current.slice(0, -1);
              term.write("\b \b");
            }
            return;
          }

          if (data === "\x03") {
            term.write("^C\r\n");
            term.write("daedalus:: ");
            inputBufferRef.current = "";
            return;
          }

          if (data >= String.fromCharCode(0x20) && data <= String.fromCharCode(0x7E)) {
            inputBufferRef.current += data;
            term.write(data);
          }
        };

        const executeCommand = (input, term) => {
          if (input === "help") {
            term.writeln("Commands: ls, cd, pwd, cat, clear, desktop, exit");
            term.write("daedalus:: ");
            return;
          }

          if (input === "desktop") {
            setDesktopOpen(true);
            return;
          }

          if (input === "exit") {
            setDesktopOpen(false);
            term.write("daedalus:: ");
            return;
          }

          if (input === "pwd") {
            term.writeln(cwdRef.current);
            term.write("daedalus:: ");
            return;
          }

          if (input === "clear") {
            term.clear();
            term.write("daedalus:: ");
            return;
          }

          if (input.startsWith("cd ")) {
            const path = input.slice(3).trim() || "/home/daedalus";
            cwdRef.current = path;
            term.write("daedalus:: ");
            return;
          }

          if (input.startsWith("ls")) {
            term.writeln("readme.txt");
            term.write("daedalus:: ");
            return;
          }

          if (input.startsWith("cat ")) {
            term.writeln("Daedalus OS - Web Terminal Simulator");
            term.write("daedalus:: ");
            return;
          }

          if (input === "") {
            term.write("daedalus:: ");
            return;
          }

          term.writeln(`Unknown: ${input}`);
          term.write("daedalus:: ");
        };

        return (
          <div className="w-screen h-screen overflow-hidden bg-black">
            <div className={desktopOpen ? "hidden" : ""}>
              <div ref={termShellRef} className="h-screen w-screen font-mono p-4"></div>
            </div>

            {desktopOpen && (
              <div className="absolute inset-0 desktop-bg">
                <div className="absolute top-0 w-full h-8 bg-black/40 border-b border-white/10 flex items-center px-6 text-xs font-medium z-50">
                  <span>Daedalus Runtime</span>
                </div>
                <div className="w-full h-full pt-10 px-8 flex items-center justify-center">
                  <div className="w-full max-w-5xl h-[70vh] glass rounded-xl mac-shadow flex flex-col">
                    <div className="h-10 border-b border-white/5 flex items-center px-4">
                      <button onClick={() => setDesktopOpen(false)} className="w-3 h-3 rounded-full bg-red-500"></button>
                    </div>
                    <div className="flex-1 w-full bg-slate-950/40" ref={termDesktopRef}></div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      function createFileSystem() {
        return { type: "dir", children: { home: { type: "dir", children: { daedalus: { type: "dir", children: {} } } } } };
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
